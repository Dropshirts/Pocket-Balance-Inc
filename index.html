<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Balance By Anaf</title>
    <style>
        :root {
            --card: #f5f5f4;
            --ring: #6366f1;
            --input: #d6d3d1;
            --muted: #e7e5e4;
            --accent: #f3e5f5;
            --border: #d6d3d1;
            --radius: 1.25rem;
            --primary: #6366f1;
            --primary-foreground: #ffffff;
            --background: #e7e5e4;
            --foreground: #1e293b;
            --muted-foreground: #6b7280;
            --font-mono: 'Roboto Mono', monospace;
        }

        .dark {
            --card: #2c2825;
            --ring: #818cf8;
            --input: #3a3633;
            --muted: #2c2825;
            --accent: #484441;
            --border: #3a3633;
            --primary: #818cf8;
            --primary-foreground: #1e1b18;
            --background: #1e1b18;
            --foreground: #e2e8f0;
            --muted-foreground: #9ca3af;
        }

        * { box-sizing: border-box; transition: background 0.3s, color 0.3s, border-color 0.3s; }
        body { 
            background-color: var(--background); 
            color: var(--foreground); 
            font-family: var(--font-mono); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            text-transform: uppercase; 
        }

        #app-container { width: 100%; max-width: 420px; padding: 20px 24px 100px 24px; }
        .hidden { display: none !important; }

        input, select { 
            background: var(--card); 
            color: var(--foreground); 
            border: 2px solid var(--border); 
            padding: 16px; 
            border-radius: var(--radius); 
            font-family: inherit; 
            width: 100%; 
            margin-bottom: 12px; 
            outline: none; 
        }

        button { 
            background: var(--primary); 
            color: var(--primary-foreground); 
            border: none; 
            padding: 16px; 
            border-radius: var(--radius); 
            font-family: inherit; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        
        button:active { transform: scale(0.98); }

        /* NAVIGATION */
        nav { 
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); 
            width: calc(100% - 40px); max-width: 380px; 
            background: var(--card); 
            border: 1px solid var(--border); 
            display: flex; padding: 8px; gap: 5px; z-index: 100; 
            align-items: center; border-radius: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        nav button { flex: 1; padding: 10px; font-size: 0.55rem; background: transparent; color: var(--muted-foreground); box-shadow: none; border-radius: 1.5rem; }
        nav button.active { background: var(--primary); color: var(--primary-foreground); }

        /* THEME SLIDER */
        .switch { width: 44px; height: 22px; background: var(--muted); border: 1px solid var(--border); border-radius: 20px; position: relative; cursor: pointer; flex-shrink: 0; margin: 0 10px; }
        .slider { position: absolute; width: 16px; height: 16px; background: var(--primary); border-radius: 50%; top: 2px; left: 2px; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .dark .slider { transform: translateX(22px); }

        /* CARDS & PROGRESS */
        .progress-container { width: 100%; height: 10px; background: var(--muted); border-radius: 20px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.8s ease; }
        
        .milestone-card, .decidr-card, .extra-item { 
            background: var(--card); 
            padding: 20px; 
            border-radius: var(--radius); 
            border: 1px solid var(--border); 
            margin-bottom: 20px; 
            position: relative; 
        }

        .status-tag { font-size: 0.5rem; padding: 4px 8px; border-radius: 6px; font-weight: bold; position: absolute; top: 15px; right: 15px; color: white; }

        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid var(--border); padding-bottom: 10px; font-weight: 900; }
        .balance-amount { font-size: 3.2rem; font-weight: 800; margin-bottom: 20px; letter-spacing: -2px; color: var(--primary); }
        .log-item { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); font-size: 0.75rem; }
        .q-label { font-size: 0.6rem; margin-bottom: 5px; display: block; color: var(--muted-foreground); font-weight: bold; }
    </style>
</head>
<body class="dark">

<div id="app-container">
    <div id="auth-gate">
        <div id="login-box" class="hidden" style="height: 80vh; display: flex; flex-direction: column; justify-content: center;">
            <h2 style="text-align: center; letter-spacing: 2px;">LOGIN</h2>
            <input type="text" id="log-user" placeholder="USERNAME">
            <input type="password" id="log-pass" placeholder="PASSWORD">
            <button onclick="login()">CONTINUE</button>
            <p onclick="toggleAuth(true)" style="font-size:0.6rem; text-align:center; cursor:pointer; margin-top:20px; opacity:0.6;">NEW USER? CREATE ACCOUNT</p>
        </div>
        <div id="signup-box" class="hidden" style="height: 80vh; display: flex; flex-direction: column; justify-content: center;">
            <h2 style="text-align: center; letter-spacing: 2px;">SIGN UP</h2>
            <input type="text" id="reg-user" placeholder="USERNAME">
            <input type="password" id="reg-pass" placeholder="PASSWORD">
            <button onclick="register()">CONTINUE</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <div id="page-vault" class="page">
            <div class="page-header"><div>VAULT PRO</div><button onclick="logout()" style="width:auto; padding:5px 12px; font-size:0.6rem; background:var(--muted); color:var(--foreground);">LOGOUT</button></div>
            <div style="font-size:0.65rem; color:var(--muted-foreground); font-weight:bold;">AVAILABLE BALANCE</div>
            <div class="balance-amount">৳<span id="bal-val">0.00</span></div>
            <input type="number" id="tx-amt" placeholder="0.00">
            <input type="text" id="tx-desc" placeholder="TRANSACTION NOTE">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <button onclick="process('add')">INFLOW (+)</button>
                <button onclick="process('sub')" style="background:var(--muted); color:var(--foreground); border:1px solid var(--border);">OUTFLOW (-)</button>
            </div>
            <div id="ledger" style="margin-top:25px;"></div>
        </div>

        <div id="page-milestones" class="page hidden">
            <div class="page-header"><div>MILESTONES</div></div>
            <div id="milestone-setup" class="hidden">
                <input type="text" id="ms-name" placeholder="GOAL NAME">
                <input type="number" id="ms-target" placeholder="TARGET AMOUNT (৳)">
                <button onclick="createMilestone()">SET NEW GOAL</button>
            </div>
            <div id="milestone-display"></div>
        </div>

        <div id="page-decidr" class="page hidden">
            <div class="page-header"><div>THE DECIDR</div></div>
            <div class="decidr-card">
                <input type="text" id="decision-task" placeholder="WHAT IS THE DECISION?">
                <label class="q-label">WILL THIS MATTER IN 1 YEAR?</label>
                <select id="q-time"><option value="1">YES</option><option value="0">NO</option></select>
                <label class="q-label">IS IT A 'HELL YES' OR A 'MAYBE'?</label>
                <select id="q-desire"><option value="1">HELL YES</option><option value="0">MAYBE</option></select>
                <label class="q-label">DOES THIS ALIGN WITH YOUR GOALS?</label>
                <select id="q-goal"><option value="1">YES</option><option value="0">NO</option></select>
                <button onclick="runDecidr()">RUN LOGIC ENGINE</button>
                <div id="decidr-result" style="margin-top:25px; text-align:center; font-weight:900; font-size: 0.9rem;"></div>
            </div>
        </div>

        <div id="page-extras" class="page hidden">
            <div class="page-header"><div>MEMO</div></div>
            <input type="text" id="extra-msg" placeholder="NOTE CONTENT">
            <select id="extra-status"><option value="INCOMING">INCOMING</option><option value="DONE">DONE</option></select>
            <button onclick="addExtra()">SAVE TO MEMO</button>
            <div id="extras-list" style="margin-top:25px;"></div>
        </div>

        <nav>
            <button id="nav-vault" class="active" onclick="showPage('vault')">VAULT</button>
            <button id="nav-milestones" onclick="showPage('milestones')">GOALS</button>
            <button id="nav-decidr" onclick="showPage('decidr')">DECIDR</button>
            <button id="nav-extras" onclick="showPage('extras')">MEMO</button>
            <div class="switch" onclick="toggleTheme()"><div class="slider"></div></div>
        </nav>
    </div>
</div>

<script>
    let user = null; let balance = 0; let logs = []; let extras = []; let milestone = null;

    window.onload = () => {
        const session = localStorage.getItem('active_session');
        if (session) { user = session; startApp(); }
        else if (!localStorage.getItem('v_user')) toggleAuth(true);
        else toggleAuth(false);
        if(localStorage.getItem('theme') === 'light') document.body.classList.remove('dark');
    };

    function toggleAuth(isSignUp) {
        document.getElementById('signup-box').classList.toggle('hidden', !isSignUp);
        document.getElementById('login-box').classList.toggle('hidden', isSignUp);
    }

    function register() {
        const u = document.getElementById('reg-user').value.toUpperCase();
        const p = document.getElementById('reg-pass').value;
        if(u && p) { localStorage.setItem('v_user', u); localStorage.setItem('v_pass', p); location.reload(); }
    }

    function login() {
        const u = document.getElementById('log-user').value.toUpperCase();
        const p = document.getElementById('log-pass').value;
        if(u === localStorage.getItem('v_user') && p === localStorage.getItem('v_pass')) {
            localStorage.setItem('active_session', u); user = u; startApp();
        } else alert("ACCESS DENIED");
    }

    function startApp() {
        document.getElementById('auth-gate').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        balance = parseFloat(localStorage.getItem(`${user}_bal`)) || 0;
        logs = JSON.parse(localStorage.getItem(`${user}_logs`)) || [];
        extras = JSON.parse(localStorage.getItem(`${user}_extras`)) || [];
        milestone = JSON.parse(localStorage.getItem(`${user}_ms`)) || null;
        updateUI();
    }

    function showPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById('page-' + page).classList.remove('hidden');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('nav-' + page).classList.add('active');
    }

    function process(type) {
        const amt = parseFloat(document.getElementById('tx-amt').value);
        if (isNaN(amt)) return;
        type === 'add' ? balance += amt : balance -= amt;
        logs.unshift({ amt: amt.toFixed(2), type, desc: document.getElementById('tx-desc').value.toUpperCase() || 'TRANSACTION', time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
        document.getElementById('tx-amt').value = ''; document.getElementById('tx-desc').value = '';
        save(); updateUI();
    }

    function runDecidr() {
        const score = parseInt(document.getElementById('q-time').value) + parseInt(document.getElementById('q-desire').value) + parseInt(document.getElementById('q-goal').value);
        let result = score >= 2 ? `<span style="color:#10b981;">[ EXECUTE: POSITIVE ALIGNMENT ]</span>` : `<span style="color:#ef4444;">
